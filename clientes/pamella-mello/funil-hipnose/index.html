<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Leitura Emocional · Pâmella Mello</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="description" content="Descubra a origem emocional do que te trava e o caminho para resolver de vez. Hipnose Clínica, Leis Biológicas e Neurociência. Contagem/BH e online." />
  <!-- CSS crítico mínimo (evita flash antes do styles.css) -->
  <style>
    :root{--bg:#F3EEE6;--text:#2A2420}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  </style>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="brand">
        <!-- Quando tiver o arquivo, troque tudo abaixo por:
             <img class="logo-img" src="logo.png" alt="Pâmella Mello · Hipnoterapia Clínica"> -->
        <span class="brand-name">Pâmella Mello</span>
        <span class="brand-tag">Hipnoterapia &amp; Neurociência</span>
      </div>
    </div>
  </header>

  <!-- Barra de progresso (só aparece durante as perguntas) -->
  <div class="progress-wrap" id="progress" hidden>
    <div class="container">
      <div class="progress-meta">
        <span id="progress-label">Passo 1 de 9</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
    </div>
  </div>

  <main class="container">
    <div id="app" aria-live="polite"><!-- as telas são renderizadas aqui --></div>
  </main>

  <p class="foot">Clínica Pâmella Mello · Hipnoterapia Clínica + Neurociência · Contagem/MG e online</p>

  <script src="flow.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
