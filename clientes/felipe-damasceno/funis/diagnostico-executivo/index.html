<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Diagnóstico Executivo (IDE) · Felipe Damasceno</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="description" content="Descubra o seu IDE, o Índice de Dependência Empresarial, e o caminho para governar a sua empresa através de pessoas, processos e indicadores." />
  <!-- CSS crítico mínimo (evita flash antes do styles.css) -->
  <style>
    :root{--bg:#0A0E16;--text:#F2EEE6}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  </style>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="brand">
        <!-- Quando tiver o logo oficial, troque tudo abaixo por:
             <img class="logo-img" src="logo.png" alt="Felipe Damasceno · Governo Empresarial"> -->
        <svg class="emblem" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
          <path d="M32 8 L50 13 V33 C50 45 42 52 32 55 C22 52 14 45 14 33 V13 Z" fill="none" stroke="#E0A63A" stroke-width="2.6" stroke-linejoin="round"/>
          <path d="M23 34 L25.5 24 L30 30 L32 21 L34 30 L38.5 24 L41 34 Z" fill="#E0A63A"/>
          <rect x="23" y="35.5" width="18" height="3.2" rx="1" fill="#E0A63A"/>
        </svg>
        <span class="brand-name">Felipe Damasceno</span>
        <span class="brand-tag">Governo Empresarial</span>
      </div>
    </div>
  </header>

  <!-- Barra de progresso (só aparece durante as perguntas) -->
  <div class="progress-wrap" id="progress" hidden>
    <div class="container">
      <div class="progress-meta">
        <span id="progress-label">Passo 1 de 9</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
    </div>
  </div>

  <main class="container">
    <div id="app" aria-live="polite"><!-- as telas são renderizadas aqui --></div>
  </main>

  <p class="foot">Felipe Damasceno · Governo Empresarial · Método Potência Empresarial</p>

  <script src="flow.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
