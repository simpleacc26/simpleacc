<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Diagnóstico Executivo (IDE) · Felipe Damasceno</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="description" content="Descubra o seu IDE, o Índice de Dependência Empresarial, e o caminho para governar a sua empresa através de pessoas, processos e indicadores." />
  <!-- CSS crítico mínimo (evita flash antes do styles.css) -->
  <style>
    :root{--bg:#0E1626;--text:#F0ECE2}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  </style>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="brand">
        <!-- Quando tiver o arquivo, troque tudo abaixo por:
             <img class="logo-img" src="logo.png" alt="Felipe Damasceno · Governo Empresarial"> -->
        <span class="brand-name">Felipe Damasceno</span>
        <span class="brand-tag">Governo Empresarial</span>
      </div>
    </div>
  </header>

  <!-- Barra de progresso (só aparece durante as perguntas) -->
  <div class="progress-wrap" id="progress" hidden>
    <div class="container">
      <div class="progress-meta">
        <span id="progress-label">Passo 1 de 9</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
    </div>
  </div>

  <main class="container">
    <div id="app" aria-live="polite"><!-- as telas são renderizadas aqui --></div>
  </main>

  <p class="foot">Felipe Damasceno · Governo Empresarial · Método Potência Empresarial</p>

  <script src="flow.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
